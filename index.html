<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>First Light</title>
  <link rel="stylesheet" href="src/style.css" />
</head>
<body>
  <!-- Região de acessibilidade: anúncios para leitores de tela -->
  <div id="aria-live" aria-live="assertive" aria-atomic="true" class="sr-only"></div>

  <!-- HUD -->
  <header id="hud" role="banner">
    <div id="hud-time" aria-label="Tempo restante">🌅 08:00</div>
    <div id="hud-actions" aria-label="Ações restantes">⏳ 16 ações</div>
    <ul id="hud-checklist" aria-label="Lista de sobrevivência" role="list"></ul>
  </header>

  <!-- Mapa (tabela criada pelo JS) -->
  <main id="map-container" role="main" aria-label="Mapa"></main>

  <!-- Dialog de ação — modal focado automaticamente pelo TalkBack -->
  <dialog id="action-dialog" aria-labelledby="action-dialog-title" aria-modal="true">
    <h2 id="action-dialog-title"></h2>
    <p id="action-dialog-desc"></p>
    <div id="action-buttons" role="group"></div>
    <button id="btn-close-action">Fechar</button>
  </dialog>

  <!-- Tela de minigame (aparece sobre o mapa) -->
  <section id="minigame-panel" aria-label="Minigame" hidden></section>

  <!-- Tela de fim de dia -->
  <section id="night-panel" aria-label="Chegou a noite" hidden>
    <h2>A noite chegou</h2>
    <p id="night-narrative"></p>
    <button id="btn-restart">Jogar novamente</button>
  </section>

  <script type="module" src="src/main.js"></script>
</body>
</html>
